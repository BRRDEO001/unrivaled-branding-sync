# Scheduled run merged into "Amrod daily incremental (products, prices, stock, categories)".
# Use this workflow only for manual category-only runs (workflow_dispatch).
name: Amrod categories only (manual)

on:
  workflow_dispatch: {}

jobs:
  categories:
    runs-on: ubuntu-latest
    environment: synced
    timeout-minutes: 30

    env:
      SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
      SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
      AMROD_USERNAME: ${{ secrets.AMROD_USERNAME }}
      AMROD_PASSWORD: ${{ secrets.AMROD_PASSWORD }}
      AMROD_CUSTOMER_CODE: ${{ secrets.AMROD_CUSTOMER_CODE }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Categories incremental gate + full sync
        working-directory: categories-fetch-once
        run: node daily-incremental.js
