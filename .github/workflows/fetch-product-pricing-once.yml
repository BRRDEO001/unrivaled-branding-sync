# Variant map + one Amrod /Prices/ download, then sharded bulk applies (sequential bulks:
# Shopify allows only one bulk mutation at a time per shop — max-parallel: 1).
# Fewer/larger shards = fewer sequential bulk jobs (Shopify: one bulk mutation at a time per shop).
# To change shard count: update SHARD_COUNT and matrix.shard together. Avoid high shard counts unless
# you need shorter per-job runtime; it does not increase concurrency (max-parallel: 1).
name: (Bulk) Fetch Product Pricing Once

on:
  workflow_dispatch: {}

jobs:
  variant-map:
    runs-on: ubuntu-latest
    environment: synced
    timeout-minutes: 120

    env:
      SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
      SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
      SHOPIFY_API_VERSION: "2026-01"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build variant map (SKU → Variant GID)
        working-directory: price-fetch-once
        run: node prices-build-variant-map.js

      - uses: actions/upload-artifact@v4
        name: Upload variant-map.json
        with:
          name: pricing-variant-map
          path: price-fetch-once/data/variant-map.json

  amrod-prices-file:
    runs-on: ubuntu-latest
    environment: synced
    timeout-minutes: 60

    env:
      AMROD_USERNAME: ${{ secrets.AMROD_USERNAME }}
      AMROD_PASSWORD: ${{ secrets.AMROD_PASSWORD }}
      AMROD_CUSTOMER_CODE: ${{ secrets.AMROD_CUSTOMER_CODE }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download Amrod prices to JSON (once)
        working-directory: price-fetch-once
        run: node download-amrod-prices.js

      - uses: actions/upload-artifact@v4
        with:
          name: pricing-amrod-prices
          path: price-fetch-once/data/amrod-prices.json

  pricing:
    needs: [variant-map, amrod-prices-file]
    runs-on: ubuntu-latest
    environment: synced
    timeout-minutes: 720

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        shard: [0, 1, 2, 3]

    env:
      SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
      SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
      SHOPIFY_API_VERSION: "2026-01"
      AMROD_USERNAME: ${{ secrets.AMROD_USERNAME }}
      AMROD_PASSWORD: ${{ secrets.AMROD_PASSWORD }}
      AMROD_CUSTOMER_CODE: ${{ secrets.AMROD_CUSTOMER_CODE }}
      # Must match the number of entries in matrix.shard below
      SHARD_COUNT: "4"
      SHARD_INDEX: ${{ matrix.shard }}
      AMROD_PRICES_JSON: data/amrod-prices.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/download-artifact@v4
        with:
          name: pricing-variant-map
          path: .

      - uses: actions/download-artifact@v4
        with:
          name: pricing-amrod-prices
          path: .

      - name: Apply prices (bulk, sharded)
        working-directory: price-fetch-once
        run: node price-apply-bulk.js

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pricing-bulk-logs-shard-${{ matrix.shard }}
          path: |
            price-fetch-once/logs/
            price-fetch-once/data/variant-price-updates-shard-${{ matrix.shard }}.jsonl
          if-no-files-found: ignore
