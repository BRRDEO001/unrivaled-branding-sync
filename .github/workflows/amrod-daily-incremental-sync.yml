# products (GetUpdated) → one Stock/ snapshot → sharded incremental prices + stock (REST).
# max-parallel: 1 = one shard at a time (avoids concurrent REST bursts and Shopify throttling).
# Cron: ~01:00 SAST (UTC+2) → 23:00 UTC.
#
# Sharding: keep SHARD_COUNT in sync with matrix.shard (default 4 → 0..3). Use 2 or 1 if still rate-limited.
name: Amrod daily incremental (products, prices, stock)

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch: {}

jobs:
  incremental-products:
    runs-on: ubuntu-latest
    environment: synced
    timeout-minutes: 360

    env:
      SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
      SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
      SHOPIFY_API_VERSION: "2026-01"
      AMROD_USERNAME: ${{ secrets.AMROD_USERNAME }}
      AMROD_PASSWORD: ${{ secrets.AMROD_PASSWORD }}
      AMROD_CUSTOMER_CODE: ${{ secrets.AMROD_CUSTOMER_CODE }}
      INCREMENTAL_CONCURRENCY: "8"
      REQUEST_DELAY_MS: "120"
      IMAGE_MIN_INTERVAL_MS: "350"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Incremental products (GetUpdatedProductsAndBranding)
        working-directory: product-fetch-once
        run: node incremental-products.js

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-product-logs
          path: product-fetch-once/logs/
          if-no-files-found: ignore

  stock-snapshot:
    runs-on: ubuntu-latest
    environment: synced
    timeout-minutes: 120

    env:
      AMROD_USERNAME: ${{ secrets.AMROD_USERNAME }}
      AMROD_PASSWORD: ${{ secrets.AMROD_PASSWORD }}
      AMROD_CUSTOMER_CODE: ${{ secrets.AMROD_CUSTOMER_CODE }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch full Amrod stock JSON (once)
        working-directory: product-fetch-once
        run: node fetch-amrod-stock-json.js

      - uses: actions/upload-artifact@v4
        with:
          name: daily-amrod-stock
          path: product-fetch-once/data/amrod-stock.json

  price-and-stock:
    needs: [incremental-products, stock-snapshot]
    runs-on: ubuntu-latest
    environment: synced
    timeout-minutes: 360

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        shard: [0, 1, 2, 3]

    env:
      SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
      SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
      SHOPIFY_API_VERSION: "2026-01"
      AMROD_USERNAME: ${{ secrets.AMROD_USERNAME }}
      AMROD_PASSWORD: ${{ secrets.AMROD_PASSWORD }}
      AMROD_CUSTOMER_CODE: ${{ secrets.AMROD_CUSTOMER_CODE }}
      SHOPIFY_LOCATION_IDS: ${{ secrets.SHOPIFY_LOCATION_IDS }}
      SHOPIFY_PRICE_DELAY_MS: "250"
      SHARD_COUNT: "4"
      SHARD_INDEX: ${{ matrix.shard }}
      AMROD_STOCK_JSON: data/amrod-stock.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/download-artifact@v4
        with:
          name: daily-amrod-stock
          path: .

      - name: Incremental prices (Prices/GetUpdated, sharded)
        working-directory: product-fetch-once
        run: node incremental-prices.js

      - name: Full stock → Shopify inventory (sharded)
        working-directory: product-fetch-once
        run: node stock-apply-full.js

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-shard-${{ matrix.shard }}-logs
          path: product-fetch-once/logs/
          if-no-files-found: ignore
