name: Import Amrod Branding Pricing

on:
  workflow_dispatch: {}

jobs:
  import_branding_pricing:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Shopify
      SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
      SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
      SHOPIFY_API_VERSION: "2026-01"

      # Amrod
      AMROD_USERNAME: ${{ secrets.AMROD_USERNAME }}
      AMROD_PASSWORD: ${{ secrets.AMROD_PASSWORD }}
      AMROD_CUSTOMER_CODE: ${{ secrets.AMROD_CUSTOMER_CODE }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verify Actions secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          [ -z "${SHOPIFY_TOKEN:-}" ] && missing+=(SHOPIFY_TOKEN)
          [ -z "${SHOPIFY_STORE:-}" ] && missing+=(SHOPIFY_STORE)
          [ -z "${AMROD_USERNAME:-}" ] && missing+=(AMROD_USERNAME)
          [ -z "${AMROD_PASSWORD:-}" ] && missing+=(AMROD_PASSWORD)
          [ -z "${AMROD_CUSTOMER_CODE:-}" ] && missing+=(AMROD_CUSTOMER_CODE)
          if [ "${#missing[@]}" -ne 0 ]; then
            echo "::error title=Missing repository secrets::Add these under Settings → Secrets and variables → Actions (Repository secrets): ${missing[*]}"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Import branding pricing
        working-directory: product-fetch-once
        run: node pricing-sync.js
